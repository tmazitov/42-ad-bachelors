name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          GITHUB_ACTIONS: true
          VITE_42_CLIENT_ID: ${{ secrets.VITE_42_CLIENT_ID }}
          VITE_42_CLIENT_SECRET: ${{ secrets.VITE_42_CLIENT_SECRET }}
          VITE_42_REDIRECT_URI: ${{ secrets.VITE_42_REDIRECT_URI }}

      - name: Create 404.html for SPA routing
        run: |
          cat > dist/404.html << 'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <script>
                sessionStorage.setItem('spa-redirect', location.href)
                location.replace('/' + location.pathname.split('/')[1] + '/')
              </script>
            </head>
          </html>
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
